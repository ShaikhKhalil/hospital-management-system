{% extends 'base.html' %}
{% block title %}Patient Dashboard{% endblock %}
{% block content %}
<div class="text-center">
    <h1 class="display-4"><i class="fas fa-user me-2"></i>Patient Dashboard</h1>
    <p class="lead">Welcome, {{ request.user.username }}!</p>
    <p>Your role is: <strong>{{ role }}</strong></p>
    <div class="row mt-4 justify-content-center">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5>My Appointments</h5>
                    <p class="display-6">0</p>
                    <a href="#" class="btn btn-primary btn-sm">View</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5>Prescriptions</h5>
                    <p class="display-6">0</p>
                    <a href="#" class="btn btn-primary btn-sm">View</a>
                </div>
            </div>
        </div>
    </div>
    <a href="{% url 'accounts:logout' %}" class="btn btn-danger mt-3">Logout</a>
</div>
{% endblock %}
